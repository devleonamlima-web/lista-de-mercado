<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020617" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icons/app-icon.svg" />
  <link rel="apple-touch-icon" href="icons/app-icon.svg" />
  <title>Lista de Mercado</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --bg-elevated: #ffffff;
      --accent: #10b981;
      --accent-soft: #d1fae5;
      --accent-strong: #6ee7b7;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --danger: #ef4444;
      --danger-soft: #fee2e2;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 999px;
      --shadow-soft: 0 18px 45px #d1d5de;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: #e5e7eb;
      color: var(--text);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 960px;
      max-height: 100vh;
      background: #ffffff;
      border-radius: 28px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      padding: 16px 20px 8px;
      border-bottom: 1px solid #e5e7eb;
      background: linear-gradient(135deg, #ecfeff, #f9fafb);
      backdrop-filter: blur(16px);
    }

    .app-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .app-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .app-title h1 {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-title span {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .counter {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
    }

    .app-body {
      padding: 12px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
      overflow: hidden;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      background: #f9fafb;
      border-radius: var(--radius-lg);
      padding: 8px 8px 8px 12px;
      border: 1px solid #e5e7eb;
    }

    .input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .input-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--muted);
      padding: 0 4px;
    }

    .inputs {
      display: flex;
      gap: 8px;
    }

    .input {
      flex: 1;
      position: relative;
    }

    .input input {
      width: 100%;
      padding: 9px 10px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .input input::placeholder {
      color: #9ca3af;
    }

    .input input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px #a7f3d0;
      background: #ffffff;
    }

    .add-btn {
      border: none;
      outline: none;
      border-radius: 999px;
      padding: 0 14px;
      height: 36px;
      background: linear-gradient(135deg, #34d399, #10b981);
      color: #022c22;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      box-shadow: 0 10px 22px #a7f3d0;
      transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease;
    }

    .add-btn span.icon {
      font-size: 1rem;
    }

    .add-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 14px 30px #6ee7b7;
    }

    .add-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px #a7f3d0;
    }

    .hint {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 4px;
    }

    .hint span.keys {
      display: inline-flex;
      align-items: center;
      gap: 2px;
    }

    .hint kbd {
      font-family: inherit;
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
    }

    .list-container {
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      padding: 8px 8px 10px;
      max-height: calc(100vh - 260px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(148, 163, 184, 0.7) transparent;
    }

    .list-container::-webkit-scrollbar {
      width: 6px;
    }

    .list-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .list-container::-webkit-scrollbar-thumb {
      background: #cbd5f5;
      border-radius: 999px;
    }

    .empty-state {
      padding: 22px 16px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .empty-state span.icon {
      font-size: 1.4rem;
    }

    .typing-indicator {
      font-size: 0.72rem;
      color: var(--muted);
      padding: 4px 6px 8px;
      display: none;
      align-items: center;
      gap: 6px;
    }

    .typing-indicator-dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.7);
      animation: pulse 1s ease-in-out infinite;
    }

    .typing-indicator-dot:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing-indicator-dot:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes pulse {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.5;
      }
      50% {
        transform: translateY(-2px);
        opacity: 1;
      }
    }

    .items {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 9px;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.08s ease;
    }

    .item:hover {
      border-color: #9ca3af;
      transform: translateY(-1px);
    }

    .item-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .item-left-main {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .item-check {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      background: #ffffff;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.08s ease;
      font-size: 0.8rem;
      color: #bbf7d0;
    }

    .item-check.checked {
      background: #d1fae5;
      border-color: var(--accent);
    }

    .item.completed .item-name {
      text-decoration: line-through;
      color: rgba(148, 163, 184, 0.8);
    }

    .item.completed .item-emoji {
      opacity: 0.7;
    }

    .item.completed .item-qty-pill {
      border-color: #d1d5db;
      color: #6b7280;
    }

    .item-emoji {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      flex-shrink: 0;
    }

    .item-main {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .item-name {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-meta {
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .item-qty-pill {
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
    }

    .remove-btn {
      border: none;
      outline: none;
      background: #fef2f2;
      color: #b91c1c;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      border: 1px solid #fecaca;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.08s ease;
    }

    .remove-btn span.icon {
      font-size: 0.9rem;
    }

    .remove-btn:hover {
      background: var(--danger-soft);
      border-color: #f97373;
      transform: translateY(-1px);
    }

    .remove-btn:active {
      transform: translateY(0);
    }

    .footer {
      padding: 10px 14px 14px;
      border-top: 1px solid #e5e7eb;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .share-link-btn {
      border-radius: 999px;
      border: 1px dashed #d1d5db;
      background: #ffffff;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.12s ease, background 0.12s ease, color 0.12s ease;
    }

    .share-link-btn:hover {
      border-color: #9ca3af;
      background: #f9fafb;
      color: #374151;
    }

    .share-btn {
      flex: 1;
      border-radius: 999px;
      border: 1px solid #34d399;
      background: linear-gradient(135deg, #6ee7b7, #34d399);
      color: #064e3b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 12px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 12px 26px #a7f3d0;
      transition: transform 0.1s ease, box-shadow 0.1s ease, border-color 0.12s ease, filter 0.1s ease;
    }

    .share-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.02);
      box-shadow: 0 16px 40px rgba(22, 163, 74, 0.28);
      border-color: #10b981;
    }

    .share-btn:active {
      transform: translateY(0);
      box-shadow: 0 10px 22px #a7f3d0;
    }

    .share-btn span.icon {
      font-size: 1.1rem;
    }

    .mini-summary {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: right;
    }

    .mini-summary strong {
      color: #d1fae5;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px 10px;
      }

      .app {
        border-radius: 22px;
        max-height: none;
      }

      .input-row {
        flex-direction: column;
        align-items: stretch;
        padding-right: 10px;
      }

      .add-btn {
        justify-content: center;
        width: 100%;
      }

      .footer-row {
        flex-direction: column;
        align-items: stretch;
      }

      .share-btn {
        width: 100%;
      }
    }

    @media (min-width: 900px) {
      body {
        padding: 24px;
      }

      .app {
        border-radius: 32px;
      }

      .app-header {
        padding: 18px 24px 10px;
      }

      .app-body {
        padding: 14px 18px 16px;
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.4fr);
        grid-template-rows: auto auto 1fr;
        column-gap: 20px;
        row-gap: 10px;
      }

      .input-row {
        grid-column: 1 / 2;
      }

      .hint {
        grid-column: 1 / 2;
      }

      .list-container {
        grid-column: 2 / 3;
        grid-row: 1 / 4;
        max-height: none;
      }

      .footer-row {
        justify-content: space-between;
        flex-wrap: nowrap;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="app-title-row">
        <div class="app-title">
          <h1>Lista de Mercado <span>🛒</span></h1>
          <span>Organize suas compras de um jeito rápido e intuitivo.</span>
        </div>
      </div>
      <div class="counter" id="counter">0 itens</div>
    </header>

    <main class="app-body">
      <section class="input-row">
        <div class="input-group">
          <div class="input-labels">
            <span>Item</span>
            <span>Qtd.</span>
          </div>
          <div class="inputs">
            <div class="input">
              <input
                id="itemName"
                type="text"
                placeholder="Ex: Leite, Ovos, Arroz..."
                autocomplete="off"
              />
            </div>
            <div class="input" style="max-width: 90px;">
              <input
                id="itemQty"
                type="number"
                min="1"
                step="1"
                inputmode="numeric"
                placeholder="1"
              />
            </div>
          </div>
        </div>
        <button class="add-btn" id="addBtn" type="button">
          <span class="icon">＋</span>
          <span>Adicionar</span>
        </button>
      </section>
      <p class="hint">
        Dica: digite o item e aperte
        <span class="keys">
          <kbd>Enter</kbd>
        </span>
        para adicionar mais rápido.
      </p>

      <section class="list-container">
        <div class="empty-state" id="emptyState">
          <span class="icon">✨</span>
          <span>Sua lista está vazia. Comece adicionando o primeiro item!</span>
        </div>
        <div class="items" id="itemsList" hidden></div>
        <div class="typing-indicator" id="typingIndicator">
          <span>Alguém está digitando</span>
          <span class="typing-indicator-dot"></span>
          <span class="typing-indicator-dot"></span>
          <span class="typing-indicator-dot"></span>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-row">
        <button class="share-link-btn" id="shareLinkBtn" type="button">
          <span>📝</span>
          <span>Compartilhar lista em texto</span>
        </button>
        <button class="share-btn" id="shareBtn" type="button">
          <span class="icon">📲</span>
          <span>Compartilhar no WhatsApp</span>
        </button>
      </div>
      <p class="mini-summary" id="miniSummary">Nenhum item na lista ainda.</p>
    </footer>
  </div>

  <script>
    const itemNameInput = document.getElementById("itemName");
    const itemQtyInput = document.getElementById("itemQty");
    const addBtn = document.getElementById("addBtn");
    const shareBtn = document.getElementById("shareBtn");
    const shareLinkBtn = document.getElementById("shareLinkBtn");
    const itemsList = document.getElementById("itemsList");
    const counter = document.getElementById("counter");
    const emptyState = document.getElementById("emptyState");
    const miniSummary = document.getElementById("miniSummary");
    const typingIndicator = document.getElementById("typingIndicator");

    let typingTimeout = null;

    const urlParams = new URLSearchParams(window.location.search);
    const encodedListaFromUrl = urlParams.get("lista") || null;

    const emojiMap = [
      { keywords: ["ovo", "ovos"], emoji: "🥚" },
      { keywords: ["leite"], emoji: "🥛" },
      { keywords: ["pão", "paes", "pao"], emoji: "🍞" },
      { keywords: ["queijo"], emoji: "🧀" },
      { keywords: ["carne", "bife"], emoji: "🥩" },
      { keywords: ["frango", "galinha"], emoji: "🍗" },
      { keywords: ["peixe", "salmão", "sardinha"], emoji: "🐟" },
      { keywords: ["arroz"], emoji: "🍚" },
      { keywords: ["feijão", "feijao"], emoji: "🫘" },
      { keywords: ["macarrão", "macarrao", "massa"], emoji: "🍝" },
      { keywords: ["banana"], emoji: "🍌" },
      { keywords: ["maçã", "maca"], emoji: "🍎" },
      { keywords: ["laranja"], emoji: "🍊" },
      { keywords: ["uva"], emoji: "🍇" },
      { keywords: ["tomate"], emoji: "🍅" },
      { keywords: ["batata"], emoji: "🥔" },
      { keywords: ["cebola"], emoji: "🧅" },
      { keywords: ["alho"], emoji: "🧄" },
      { keywords: ["sal"], emoji: "🧂" },
      { keywords: ["açúcar", "acucar"], emoji: "🍬" },
      { keywords: ["café", "cafe"], emoji: "☕" },
      { keywords: ["água", "agua"], emoji: "💧" },
      { keywords: ["refrigerante", "refri"], emoji: "🥤" },
      { keywords: ["cerveja"], emoji: "🍺" },
      { keywords: ["vinho"], emoji: "🍷" },
      { keywords: ["sabão", "sabao", "detergente"], emoji: "🧴" },
      { keywords: ["arroz integral"], emoji: "🌾" },
      { keywords: ["papel higiênico", "papel higienico"], emoji: "🧻" },
      { keywords: ["sabão em pó", "sabao em po"], emoji: "🧼" },
      { keywords: ["shampoo"], emoji: "🧴" },
      { keywords: ["fruta", "frutas"], emoji: "🍓" },
      { keywords: ["legume", "legumes"], emoji: "🥕" },
    ];

    function getEmojiForItem(name) {
      const cleaned = String(name || "").toLowerCase().trim();
      if (!cleaned) return "🛍️";

      for (const entry of emojiMap) {
        if (entry.keywords.some((kw) => cleaned.includes(kw))) {
          return entry.emoji;
        }
      }
      return "🛍️";
    }

    function updateCounterAndSummary() {
      const items = itemsList.querySelectorAll(".item");
      const count = items.length;
      counter.textContent = count === 1 ? "1 item" : `${count} itens`;

      if (count === 0) {
        miniSummary.textContent = "Nenhum item na lista ainda.";
        return;
      }

      let totalQty = 0;
      items.forEach((item) => {
        const qty = Number(item.dataset.qty || 0);
        totalQty += Number.isFinite(qty) ? qty : 0;
      });

      miniSummary.innerHTML =
        "Você tem <strong>" +
        count +
        (count === 1 ? " item" : " itens") +
        "</strong> na lista (" +
        "<strong>" +
        totalQty +
        "</strong> no total).";
    }

    function toggleEmptyState() {
      const hasItems = itemsList.querySelectorAll(".item").length > 0;
      emptyState.hidden = hasItems;
      itemsList.hidden = !hasItems;
      // reforço visual para evitar qualquer problema com o atributo hidden
      emptyState.style.display = hasItems ? "none" : "flex";
      itemsList.style.display = hasItems ? "flex" : "none";
    }

    function setTyping(show) {
      if (show) {
        typingIndicator.style.display = "flex";
      } else {
        typingIndicator.style.display = "none";
      }
    }

    function markTyping() {
      setTyping(true);
      if (typingTimeout) {
        clearTimeout(typingTimeout);
      }
      typingTimeout = setTimeout(() => setTyping(false), 1200);
    }

    function createItemElement({ id, name, qty, emoji, completed }) {
      const itemEl = document.createElement("div");
      itemEl.className = "item";
      if (completed) itemEl.classList.add("completed");
      const safeId = id || Math.random().toString(36).slice(2);
      itemEl.dataset.id = safeId;
      itemEl.dataset.name = name;
      itemEl.dataset.qty = String(qty);
      itemEl.dataset.completed = completed ? "1" : "0";

      itemEl.innerHTML = `
        <div class="item-left">
          <div class="item-check${completed ? " checked" : ""}" aria-label="Marcar como buscado" role="button"></div>
          <div class="item-left-main">
            <div class="item-emoji">${emoji}</div>
            <div class="item-main">
              <div class="item-name">${name}</div>
              <div class="item-meta">
                <span class="item-qty-pill">${qty}x</span>
              </div>
            </div>
          </div>
        </div>
        <button class="remove-btn" type="button">
          <span class="icon">✕</span>
          <span>Remover</span>
        </button>
      `;

      const checkBtn = itemEl.querySelector(".item-check");
      checkBtn.addEventListener("click", () => {
        const isCompleted = itemEl.dataset.completed === "1";
        const newCompleted = !isCompleted;
        itemEl.dataset.completed = newCompleted ? "1" : "0";
        checkBtn.classList.toggle("checked", newCompleted);
        itemEl.classList.toggle("completed", newCompleted);
      });

      const removeBtn = itemEl.querySelector(".remove-btn");
      removeBtn.addEventListener("click", () => {
        itemEl.remove();
        toggleEmptyState();
        updateCounterAndSummary();
      });

      return itemEl;
    }

    function getItemsSnapshot() {
      const nodes = itemsList.querySelectorAll(".item");
      const arr = [];
      nodes.forEach((el) => {
        const name = el.dataset.name || "";
        const qty = Number(el.dataset.qty || 1);
        const emoji = el.querySelector(".item-emoji")?.textContent || getEmojiForItem(name);
        const completed = el.dataset.completed === "1";
        arr.push({ name, qty, emoji, completed });
      });
      return arr;
    }

    function encodeItemsForUrl(items) {
      if (!items || !items.length) return "";
      try {
        const json = JSON.stringify(items);
        // encode em UTF-8 e depois base64
        return btoa(unescape(encodeURIComponent(json)));
      } catch (e) {
        console.warn("Falha ao codificar lista na URL:", e);
        return "";
      }
    }

    function decodeItemsFromUrlParam(param) {
      if (!param) return [];
      try {
        const json = decodeURIComponent(escape(atob(param)));
        const parsed = JSON.parse(json);
        if (Array.isArray(parsed)) {
          return parsed
            .filter((it) => it && typeof it.name === "string")
            .map((it) => ({
              name: it.name || "",
              qty: Number(it.qty || 1),
              emoji: it.emoji || getEmojiForItem(it.name || ""),
              completed: !!it.completed,
            }));
        }
        return [];
      } catch (e) {
        console.warn("Falha ao decodificar lista da URL:", e);
        return [];
      }
    }

    function buildShareableUrl() {
      const items = getItemsSnapshot();
      const baseUrl = new URL(window.location.href);
      if (!items.length) {
        baseUrl.searchParams.delete("lista");
        return baseUrl.toString();
      }
      const encoded = encodeItemsForUrl(items);
      if (!encoded) {
        baseUrl.searchParams.delete("lista");
        return baseUrl.toString();
      }
      baseUrl.searchParams.set("lista", encoded);
      return baseUrl.toString();
    }

    function addItem() {
      const name = itemNameInput.value.trim();
      const qtyValue = itemQtyInput.value.trim();

      if (!name) {
        itemNameInput.focus();
        return;
      }

      let qty = parseInt(qtyValue, 10);
      if (Number.isNaN(qty) || qty <= 0) {
        qty = 1;
      }

      const emoji = getEmojiForItem(name);

      const itemEl = createItemElement({ id: null, name, qty, emoji, completed: false });
      itemsList.appendChild(itemEl);

      itemNameInput.value = "";
      itemQtyInput.value = "";
      itemNameInput.focus();

      toggleEmptyState();
      updateCounterAndSummary();
    }

    function buildWhatsAppMessage() {
      const nodes = itemsList.querySelectorAll(".item");
      if (!nodes.length) {
        return "";
      }

      const lines = ["Lista de mercado 🛒", ""];

      nodes.forEach((item, index) => {
        const name = item.dataset.name || "";
        const qty = item.dataset.qty || "1";
        const emoji = item.querySelector(".item-emoji")?.textContent || "🛍️";
        const completed = item.dataset.completed === "1";
        const prefix = completed ? "✅" : "⬜";
        lines.push(`${index + 1}. ${prefix} ${emoji} ${name} — ${qty}x`);
      });

      return lines.join("\n");
    }

    function shareOnWhatsApp() {
      const message = buildWhatsAppMessage();
      if (!message) {
        alert("Adicione pelo menos um item antes de compartilhar.");
        return;
      }
      const link = buildShareableUrl();
      const fullMessage = `${message}\n\n${link}`;
      const encoded = encodeURIComponent(fullMessage);
      const url = `https://api.whatsapp.com/send?text=${encoded}`;
      window.open(url, "_blank");
    }

    addBtn.addEventListener("click", addItem);
    shareBtn.addEventListener("click", shareOnWhatsApp);

    shareLinkBtn.addEventListener("click", async () => {
      const message = buildWhatsAppMessage();
      if (!message) {
        alert("Adicione pelo menos um item antes de compartilhar.");
        return;
      }
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(message);
          alert("Lista em texto copiada para a área de transferência.");
        } else {
          prompt("Copie a lista em texto:", message);
        }
      } catch {
        prompt("Copie a lista em texto:", message);
      }
    });

    itemNameInput.addEventListener("input", () => {
      markTyping();
    });

    itemQtyInput.addEventListener("input", () => {
      markTyping();
    });

    itemNameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        addItem();
      }
    });

    itemQtyInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        addItem();
      }
    });

    // Se a URL já tiver uma lista codificada, reconstruir os itens
    if (encodedListaFromUrl) {
      const itemsFromUrl = decodeItemsFromUrlParam(encodedListaFromUrl);
      if (itemsFromUrl.length) {
        itemsFromUrl.forEach((data) => {
          const itemEl = createItemElement({
            id: null,
            name: data.name,
            qty: data.qty,
            emoji: data.emoji,
            completed: data.completed,
          });
          itemsList.appendChild(itemEl);
        });
      }
    }

    toggleEmptyState();
    updateCounterAndSummary();
    itemNameInput.focus();
  </script>
</body>
</html>
